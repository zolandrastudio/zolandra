kind = "web"
previewPath = "/"
title = "Zolandra Studio"
version = "1.0.0"
id = "artifacts/zolandra-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20353

[services.development]
run = "pnpm --filter @workspace/zolandra-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zolandra-studio", "run", "build" ]
publicDir = "artifacts/zolandra-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20353"
BASE_PATH = "/"
